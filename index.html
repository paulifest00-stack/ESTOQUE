<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contagem de Estoque · Paulifest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Outfit:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f7f5;--surf:#ffffff;--line:#ebe9e4;--line2:#e0ddd6;
  --ink:#1c1a17;--mut:#8c8780;--soft:#b5b0a8;
  --acc:#2f7d63;--acc-soft:#eaf4ef;--acc-ink:#1f5847;
  --shadow:0 18px 40px -22px rgba(40,38,33,.35);
}
html{font-size:16px}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);
  min-height:100dvh;padding:0 0 110px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
}

header{
  position:sticky;top:0;z-index:30;background:rgba(247,247,245,.82);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--line);
  padding:16px 18px 13px;
}
.htop{display:flex;align-items:center;justify-content:space-between;gap:12px}
header h1{font-family:'Sora',sans-serif;font-size:1.18rem;font-weight:800;letter-spacing:-.4px}
header .sync{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--mut);font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;background:var(--soft);transition:.3s}
.dot.on{background:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
.gear{background:var(--surf);border:1px solid var(--line2);width:38px;height:38px;border-radius:11px;
  display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:.2s;flex-shrink:0}
.gear:active{transform:scale(.93)}

.tabs{display:flex;gap:7px;margin-top:14px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:transparent;border:1px solid var(--line2);color:var(--mut);
  padding:7px 14px;border-radius:30px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.22s;white-space:nowrap;font-family:'Outfit'}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

main{padding:16px 14px 0;max-width:560px;margin:0 auto}

.prod{background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:16px 15px;margin-bottom:12px;
  box-shadow:var(--shadow);animation:rise .35s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.phead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.phead h2{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.3px}
.phead .base{font-size:.68rem;color:var(--soft);font-weight:500}

.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.row:first-of-type{border-top:none}
.row .rl{display:flex;flex-direction:column}
.row .rl .name{font-size:.92rem;font-weight:600}
.row .rl .eq{font-size:.68rem;color:var(--soft)}

.stepper{display:flex;align-items:center;gap:0;background:var(--bg);border:1px solid var(--line2);border-radius:13px;padding:3px}
.stepper button{width:40px;height:40px;border:none;background:transparent;font-size:1.5rem;font-weight:600;
  color:var(--acc-ink);cursor:pointer;border-radius:10px;transition:.12s;display:grid;place-items:center;font-family:'Sora'}
.stepper button:active{background:var(--acc-soft);transform:scale(.9)}
.stepper button.minus{color:var(--soft)}
.stepper .num{width:46px;text-align:center;font-family:'Sora';font-weight:700;font-size:1.15rem;
  border:none;background:transparent;color:var(--ink);-moz-appearance:textfield}
.stepper .num::-webkit-outer-spin-button,.stepper .num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.ptot{margin-top:13px;display:flex;align-items:center;justify-content:space-between;
  background:var(--acc-soft);border-radius:13px;padding:11px 14px}
.ptot .l{font-size:.76rem;color:var(--acc-ink);font-weight:600}
.ptot .v{font-family:'Sora';font-weight:800;font-size:1.35rem;color:var(--acc-ink)}
.ptot .v small{font-size:.68rem;font-weight:500;opacity:.7}

.bar{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  background:rgba(247,247,245,.9);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;gap:10px;max-width:560px;margin:0 auto}
.btn{flex:1;border:none;border-radius:15px;padding:15px;font-family:'Sora';font-weight:700;font-size:.95rem;cursor:pointer;transition:.18s}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-main{background:var(--ink);color:#fff;flex:2}
.btn-ghost{background:var(--surf);color:var(--mut);border:1px solid var(--line2)}

.ov{position:fixed;inset:0;z-index:50;background:rgba(28,26,23,.45);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex;animation:fade .2s both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:22px 18px calc(24px + env(safe-area-inset-bottom));
  animation:up .3s cubic-bezier(.16,1,.3,1) both;max-height:88dvh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{font-family:'Sora';font-size:1.2rem;font-weight:800;margin-bottom:5px}
.sheet p.d{font-size:.82rem;color:var(--mut);margin-bottom:16px;line-height:1.5}
.field{margin-bottom:13px}
.field label{display:block;font-size:.73rem;font-weight:600;color:var(--mut);margin-bottom:6px}
.field input,.field textarea{width:100%;border:1px solid var(--line2);background:var(--bg);border-radius:12px;
  padding:12px;font-family:'Outfit';font-size:.9rem;color:var(--ink);resize:vertical}
.field textarea{min-height:120px;font-family:monospace;font-size:.78rem}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}

.rrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.rrow:last-child{border:none}
.rrow b{font-family:'Sora';color:var(--acc-ink)}
.rrow b.z{color:var(--soft)}
.rgrp{font-family:'Sora';font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--soft);margin:16px 0 2px;font-weight:700}
.copy{width:100%;margin-top:18px;background:var(--acc);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Sora';font-weight:700;cursor:pointer}
.copy:active{transform:scale(.98)}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<header>
  <div class="htop">
    <h1>Contagem de Estoque</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="sync"><span class="dot" id="dot"></span><span id="syncTxt">conectando…</span></span>
      <button class="gear" onclick="openSheet('cfg')" aria-label="Configurar sincronização">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<main id="list"></main>

<div class="bar">
  <button class="btn btn-ghost" onclick="zerar()">Zerar</button>
  <button class="btn btn-main" onclick="openSheet('rel')">Relatório</button>
</div>

<div class="ov" id="ov-cfg" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <h3>Sincronização</h3>
    <p class="d">Já vem conectado no Firebase da Paulifest. Aqui dá só pra trocar o nome da sala caso queira separar contagens (ex: outra loja ou outro mês).</p>
    <div class="field"><label>Nome da sala</label>
      <input id="room" placeholder="ex: contagem-paulifest"></div>
    <button class="copy" onclick="trocarSala()">Trocar sala</button>
    <button class="copy" style="background:var(--surf);color:var(--mut);border:1px solid var(--line2);margin-top:8px" onclick="closeSheet()">Fechar</button>
  </div>
</div>

<div class="ov" id="ov-rel" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="relBody"></div>
</div>

<script>
/* ===== CONFIG EMBUTIDA ===== */
const FB_CONFIG={
  apiKey:"AIzaSyB8ILEp2hn0MgpvpdoNRibK9lGySz_wd6k",
  authDomain:"paulifest-estoque.firebaseapp.com",
  databaseURL:"https://paulifest-estoque-default-rtdb.firebaseio.com",
  projectId:"paulifest-estoque",
  storageBucket:"paulifest-estoque.firebasestorage.app",
  messagingSenderId:"406939080418",
  appId:"1:406939080418:web:ebf831b61f3b18c5afb0bb"
};
const SALA_PADRAO="contagem-paulifest";
/* =========================== */

const GRUPOS={
 "Linha B / H":[{n:"B1"},{n:"B2"},{n:"B3"},{n:"B4"},{n:"B16"},{n:"H1"},{n:"H2"},{n:"H3"},{n:"HM04"}],
 "Linha M":[{n:"M101",m200:true},{n:"M102",no400:true}],
 "Marmitex":[{n:"Marmitex 102",no400:true},{n:"Marmitex 104",no400:true},{n:"Marmitex 300ml",no400:true},{n:"Marmitex 500ml",no400:true}],
 "Cumbuca / Prato":[{n:"Cumbuca 15",pacote:true},{n:"Prato 23",pacote:true}]
};
const KEY="estoque_paulifest_v2";
let data=JSON.parse(localStorage.getItem(KEY)||"{}");
let active=Object.keys(GRUPOS)[0];
let db=null, room=null;

function fields(p){
 if(p.pacote)return[{k:"fardo",label:"Fardo fechado",eq:"10 pacotes",f:10},{k:"p10",label:"Pacote solto",eq:"1 pacote",f:1}];
 let a=[];
 if(!p.no400)a.push({k:"f400",label:"Fardo 400",eq:"40 pacotes",f:40});
 if(p.m200)a.push({k:"f200",label:"Fardo 200",eq:"20 pacotes",f:20});
 a.push({k:"f100",label:"Fardinho 100",eq:"10 pacotes",f:10});
 a.push({k:"p10",label:"Pacote 10",eq:"1 pacote",f:1});
 return a;
}
function calc(p){let t=0,d=data[p.n]||{};fields(p).forEach(f=>t+=(parseInt(d[f.k])||0)*f.f);return t}
function unit(p){return p.pacote?"pacotes":"pac.10"}

function renderTabs(){
 document.getElementById("tabs").innerHTML=Object.keys(GRUPOS).map(g=>
  `<button class="tab ${g===active?'on':''}" onclick="setTab('${g}')">${g}</button>`).join("");
}
function setTab(g){active=g;renderTabs();renderList()}

function renderList(){
 document.getElementById("list").innerHTML=GRUPOS[active].map(p=>{
  const rows=fields(p).map(f=>{
   const v=(data[p.n]&&data[p.n][f.k])||0;
   return `<div class="row">
     <div class="rl"><span class="name">${f.label}</span><span class="eq">${f.eq}</span></div>
     <div class="stepper">
       <button class="minus" onclick="step('${p.n}','${f.k}',-1)">−</button>
       <input class="num" type="number" inputmode="numeric" value="${v}" onchange="setVal('${p.n}','${f.k}',this.value)">
       <button onclick="step('${p.n}','${f.k}',1)">+</button>
     </div></div>`;
  }).join("");
  return `<div class="prod">
   <div class="phead"><h2>${p.n}</h2><span class="base">base: ${p.pacote?'pacote':'pac. de 10'}</span></div>
   ${rows}
   <div class="ptot"><span class="l">Total pro PDV</span><span class="v" id="t_${p.n}">${calc(p)} <small>${unit(p)}</small></span></div>
  </div>`;
 }).join("");
}

function save(){localStorage.setItem(KEY,JSON.stringify(data));if(db&&room)db.ref('salas/'+room).set(data)}
function refreshTot(n){const p=GRUPOS[active].find(x=>x.n===n);if(p)document.getElementById("t_"+n).innerHTML=calc(p)+' <small>'+unit(p)+'</small>'}

function step(n,k,d){
 if(!data[n])data[n]={};
 let v=(parseInt(data[n][k])||0)+d; if(v<0)v=0;
 data[n][k]=v; save(); renderList();
}
function setVal(n,k,val){if(!data[n])data[n]={};let v=parseInt(val)||0;if(v<0)v=0;data[n][k]=v;save();refreshTot(n)}

function zerar(){if(!confirm("Zerar toda a contagem?"))return;data={};save();renderList()}

function openSheet(id){
 if(id==='rel')buildReport();
 if(id==='cfg'){document.getElementById('room').value=room||SALA_PADRAO}
 document.getElementById('ov-'+id).classList.add('show');
}
function closeSheet(){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('show'))}

function buildReport(){
 let h=`<h3>Relatório</h3><p class="d">${new Date().toLocaleString('pt-BR')} · digite no PDV</p>`;
 let txt="CONTAGEM ESTOQUE - "+new Date().toLocaleDateString('pt-BR')+"\n\n";
 Object.keys(GRUPOS).forEach(g=>{
  h+=`<div class="rgrp">${g}</div>`; txt+="["+g+"]\n";
  GRUPOS[g].forEach(p=>{const t=calc(p);h+=`<div class="rrow"><span>${p.n}</span><b class="${t===0?'z':''}">${t} ${unit(p)}</b></div>`;txt+=`${p.n}: ${t} ${unit(p)}\n`});
  txt+="\n";
 });
 h+=`<button class="copy" onclick='copyRep(${JSON.stringify(txt)})'>Copiar pro WhatsApp</button>`;
 h+=`<button class="copy" style="background:var(--surf);color:var(--mut);border:1px solid var(--line2);margin-top:8px" onclick="closeSheet()">Fechar</button>`;
 document.getElementById('relBody').innerHTML=h;
}
function copyRep(t){navigator.clipboard.writeText(t).then(()=>alert("Copiado! Cola no WhatsApp."))}

function trocarSala(){
 const r=document.getElementById('room').value.trim();
 if(!r){alert("Digita o nome da sala.");return}
 localStorage.setItem('fb_room',r);
 connectFirebase(FB_CONFIG,r);closeSheet();
}

function connectFirebase(cfg,r){
 const go=()=>{
  try{
   if(!firebase.apps.length)firebase.initializeApp(cfg);
   db=firebase.database();room=r;
   db.ref('salas/'+r).on('value',s=>{const val=s.val();if(val){data=val;localStorage.setItem(KEY,JSON.stringify(data));renderList()}});
   document.getElementById('dot').classList.add('on');
   document.getElementById('syncTxt').textContent='sala: '+r;
  }catch(e){document.getElementById('syncTxt').textContent='erro';alert("Erro ao conectar: "+e.message)}
 };
 if(window.firebase&&firebase.database){go();return}
 const s1=document.createElement('script');s1.src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js";
 const s2=document.createElement('script');s2.src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js";
 s1.onload=()=>document.head.appendChild(s2);s2.onload=go;document.head.appendChild(s1);

}

/* ===== AUTO-CONECTA SOZINHO AO ABRIR ===== */
renderTabs();renderList();
connectFirebase(FB_CONFIG, localStorage.getItem('fb_room')||SALA_PADRAO);
</script>
</body>
</html>
